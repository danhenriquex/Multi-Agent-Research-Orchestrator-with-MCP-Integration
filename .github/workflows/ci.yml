name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff linter
        run: uv tool run ruff check .

      - name: Run ruff formatter check
        run: uv tool run ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: .coverage
          if-no-files-found: ignore

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - name: search-mcp
            dockerfile: src/mcp_servers/search/Dockerfile
          - name: summarization-mcp
            dockerfile: src/mcp_servers/summarization/Dockerfile
          - name: knowledge-mcp
            dockerfile: src/mcp_servers/knowledge/Dockerfile
          - name: search-agent
            dockerfile: src/agents/search/Dockerfile
          - name: summarize-agent
            dockerfile: src/agents/summarize/Dockerfile
          - name: fact-check-agent
            dockerfile: src/agents/fact_check/Dockerfile
          - name: orchestrator
            dockerfile: src/orchestrator/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: research-agent-${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          POSTGRES_PASSWORD=testpass
          LOG_LEVEL=INFO
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2=true
          LANGSMITH_PROJECT=research-agent-ci
          ENVEOF

      - name: Start infrastructure + MCP servers
        run: |
          docker compose -p research-agent -f docker-compose.yml --env-file .env up -d \
            redis postgres chromadb search-mcp summarization-mcp knowledge-mcp
          echo "Waiting for services to be healthy..."
          sleep 40

      - name: Check search-mcp is up
        run: |
          docker compose -p research-agent exec -T search-mcp \
            python3 -c "import socket; s=socket.create_connection(('localhost',8001),3); s.close(); print('search-mcp OK')"

      - name: Check summarization-mcp is up
        run: |
          docker compose -p research-agent exec -T summarization-mcp \
            python3 -c "import socket; s=socket.create_connection(('localhost',8002),3); s.close(); print('summarization-mcp OK')"

      - name: Check knowledge-mcp is up
        run: |
          docker compose -p research-agent exec -T knowledge-mcp \
            python3 -c "import socket; s=socket.create_connection(('localhost',8003),3); s.close(); print('knowledge-mcp OK')"

      - name: Test search-mcp tools
        run: |
          docker compose -p research-agent run --rm orchestrator python3 -c "
          import asyncio
          from fastmcp import Client

          async def test():
              async with Client('http://search-mcp:8001/mcp') as client:
                  tools = await client.list_tools()
                  names = [t.name for t in tools]
                  assert 'web_search' in names, f'web_search missing, got: {names}'
                  assert 'cached_search' in names, f'cached_search missing, got: {names}'
                  print('✓ search-mcp tools:', names)

          asyncio.run(test())
          "

      - name: Test summarization-mcp tools
        run: |
          docker compose -p research-agent run --rm orchestrator python3 -c "
          import asyncio
          from fastmcp import Client

          async def test():
              async with Client('http://summarization-mcp:8002/mcp') as client:
                  tools = await client.list_tools()
                  names = [t.name for t in tools]
                  assert 'summarize_text' in names, f'summarize_text missing, got: {names}'
                  print('✓ summarization-mcp tools:', names)

          asyncio.run(test())
          "

      - name: Test knowledge-mcp tools
        run: |
          docker compose -p research-agent run --rm orchestrator python3 -c "
          import asyncio
          from fastmcp import Client

          async def test():
              async with Client('http://knowledge-mcp:8003/mcp') as client:
                  tools = await client.list_tools()
                  names = [t.name for t in tools]
                  assert 'verify_claims' in names, f'verify_claims missing, got: {names}'
                  assert 'index_documents' in names, f'index_documents missing, got: {names}'
                  print('✓ knowledge-mcp tools:', names)

          asyncio.run(test())
          "

      - name: Dump logs on failure
        if: failure()
        run: docker compose -p research-agent logs

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          POSTGRES_PASSWORD=testpass
          LOG_LEVEL=INFO
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2=true
          LANGSMITH_PROJECT=research-agent-ci
          ENVEOF

      - name: Start full stack
        run: |
          docker compose -p research-agent -f docker-compose.yml --env-file .env up -d --wait --wait-timeout 120

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short
        env:
          ORCHESTRATOR_URL: http://localhost:8000
          SEARCH_AGENT_URL: http://localhost:8010
          SUMMARIZE_AGENT_URL: http://localhost:8011
          FACT_CHECK_AGENT_URL: http://localhost:8012
          SEARCH_MCP_URL: http://localhost:8001
          KNOWLEDGE_MCP_URL: http://localhost:8003

      - name: Dump logs on failure
        if: failure()
        run: docker compose -p research-agent logs

      - name: Tear down
        if: always()
        run: docker compose -p research-agent down -v

  regression-eval:
    name: Regression Evaluation Gate
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Create .env for CI
        run: |
          cat > .env << 'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          POSTGRES_PASSWORD=testpass
          LOG_LEVEL=INFO
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_TRACING_V2=true
          LANGSMITH_PROJECT=research-agent-ci
          EMBEDDING_MODEL=text-embedding-3-small
          CACHE_NAMESPACE=ci
          ENVEOF

      - name: Start full stack
        run: |
          docker compose -p research-agent -f docker-compose.yml --env-file .env up -d --wait --wait-timeout 120

      - name: Run regression smoke suite
        run: uv run python evals/regression_runner.py --suite smoke --check-regression
        env:
          ORCHESTRATOR_URL: http://localhost:8000
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-scores-${{ github.sha }}
          path: evals/baselines/

      - name: Dump logs on failure
        if: failure()
        run: docker compose -p research-agent logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose -p research-agent down -v

  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: regression-eval
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'homolog' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "GCP_PROJECT=${{ secrets.GCP_PROJECT_PROD }}" >> $GITHUB_ENV
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "GCP_SA_KEY=${{ secrets.GCP_SA_KEY_PROD }}" >> $GITHUB_ENV
          else
            echo "GCP_PROJECT=${{ secrets.GCP_PROJECT_HOMOLOG }}" >> $GITHUB_ENV
            echo "ENVIRONMENT=homolog" >> $GITHUB_ENV
            echo "GCP_SA_KEY=${{ secrets.GCP_SA_KEY_HOMOLOG }}" >> $GITHUB_ENV
          fi
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          echo "REGION=us-central1" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ github.ref == 'refs/heads/main' && secrets.GCP_SA_KEY_PROD || secrets.GCP_SA_KEY_HOMOLOG }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all images
        run: |
          REGISTRY=${REGION}-docker.pkg.dev/${GCP_PROJECT}/research-agent

          declare -A DOCKERFILES=(
            ["orchestrator"]="src/orchestrator/Dockerfile"
            ["search-agent"]="src/agents/search/Dockerfile"
            ["summarize-agent"]="src/agents/summarize/Dockerfile"
            ["fact-check-agent"]="src/agents/fact_check/Dockerfile"
            ["search-mcp"]="src/mcp_servers/search/Dockerfile"
            ["summarization-mcp"]="src/mcp_servers/summarization/Dockerfile"
            ["knowledge-mcp"]="src/mcp_servers/knowledge/Dockerfile"
          )

          for service in "${!DOCKERFILES[@]}"; do
            dockerfile="${DOCKERFILES[$service]}"
            image="${REGISTRY}/${service}"
            echo "Building $service → $image:${IMAGE_TAG}"
            docker build \
              --cache-from ${image}:latest \
              --tag ${image}:${IMAGE_TAG} \
              --tag ${image}:latest \
              --file ${dockerfile} \
              --push \
              .
            echo "✓ $service pushed"
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${GCP_PROJECT}" \
            -var="environment=${ENVIRONMENT}" \
            -var="image_tag=${IMAGE_TAG}" \
            -var="region=${REGION}"

      - name: Wait for Cloud Run cold start
        run: sleep 20

      - name: Verify deployment
        run: |
          ORCHESTRATOR_URL=$(cd terraform && terraform output -raw orchestrator_url)
          echo "Orchestrator URL: ${ORCHESTRATOR_URL}"
          curl -sf "${ORCHESTRATOR_URL}/health" | python3 -m json.tool
          echo "✓ Deployment verified"

      - name: Post deployment summary
        if: always()
        run: |
          ORCHESTRATOR_URL=$(cd terraform && terraform output -raw orchestrator_url 2>/dev/null || echo "unknown")
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${ENVIRONMENT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | ${IMAGE_TAG} |" >> $GITHUB_STEP_SUMMARY
          echo "| GCP Project | ${GCP_PROJECT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Orchestrator | ${ORCHESTRATOR_URL} |" >> $GITHUB_STEP_SUMMARY
